<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Academic Manager</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add-course.html">Add Course</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Add a New Course</h2>
            <form>
                <label>Course Name</label>
                <input type="text" placeholder="e.g. Artificial Intelligence" required>
                <label>Instructor</label>
                <input type="text" placeholder="Instructor Name" required>
                <label>Credit Hours</label>
                <input type="number" min="1" max="5">
                <label>Notes</label>
                <textarea rows="4" placeholder="Additional details..."></textarea>
                <button type="submit">Save Course</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Student Portfolio</p>
    </footer>
</body>

</html>
