    <nav>

            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add-course.html">Add Course</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Contact Us</h2>
            <p>هل لديك أي استفسار؟ يمكنك التواصل معنا من خلال النموذج التالي:</p>

            <form style="margin-top: 20px;">
                <label>Full Name</label>
                <input type="text" placeholder="Your Name" required>

                <label>Email Address</label>
                <input type="email" placeholder="example@mail.com" required>

                <label>Subject</label>
                <select>
                    <option>General Inquiry</option>
                    <option>Technical Support</option>
                    <option>Feedback</option>
                </select>

                <label>Message</label>
                <textarea rows="5" placeholder="Write your message here..."></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Portfolio | Course Organizer Project</p>
    </footer>
